<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Wave Terrain Synthesis</title>
    <script type="importmap">{"imports": {"three": "https://jsdelivr.net"}}</script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="info">wavy wavy <span id="precision-badge">FINE (x)</span></div>

    <div class="slidecontainer">
      <div><label id="wave-display">Wave Selection: Wave 2</label><input type="range" min="1" max="5" value="2" step="1" class="slider" id="wave-select"></div>
      <div class="mt-6"><label id="freq-display">Frequency:</label><input type="range" min="20" max="800" value="80" step="1" class="slider" id="freq"></div>
      <div class="mt-6"><label id="fm-display">FM Intensity: </label><input type="range" min="0" max="500" value="0" step="1" class="slider" id="fm-index"></div>
      <div class="mt-6"><label id="fm-ratio-display">FM Ratio: 2.0</label><input type="range" min="0.5" max="8.0" value="2.0" step="0.25" class="slider" id="fm-ratio"></div>
      <div class="mt-6"><label id="yscale-display">Y-Scale Profile:</label><input type="range" min="-5.0" max="5.0" value="-1.7" step="0.1" class="slider" id="y-scale"></div>
      <div class="mt-6"><label id="param-a-display">Wave Shape (a): 1.50</label><input type="range" min="-5.0" max="15.0" value="1.5" step="0.05" class="slider" id="param-a"></div>
      
      

      <div class="mt-6"><label id="volume-display">Master Volume:</label><input type="range" min="0.0" max="1.0" value="0.4" step="0.01" class="slider" id="volume"></div>
    </div>

    <div class="slidecontainer mod-panel" id="mod-panel">
      <h3>Modulation (click canvas to enable audio first)</h3>

      <div class="mod-panel-columns">
        <div class="mod-col">
          <label>LFOs</label>
          <div id="lfo-panel" class="lfo-panel"></div>
        </div>

        <div class="mod-col">
          <label>Envelope</label>
          <div id="env-panel" class="env-panel"></div>
        </div>

        <div class="mod-col">
          <label>Matrix</label>
          <div id="matrix-panel" class="matrix-grid"></div>
        </div>
      </div>
    </div>

    <canvas id="canvas"></canvas>
    <canvas id="uiCanvas" style="position: absolute; top:0; left:0; z-index:2; pointer-events: none; width:100vw; height:100vh;"></canvas>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
