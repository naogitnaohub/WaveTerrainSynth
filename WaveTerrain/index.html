<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Wave Terrain Synthesis</title>
    <script type="importmap">{"imports": {"three": "https://jsdelivr.net"}}</script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="info">wavy wavy</div>

    <div class="control-panel" id="control-panel">
      <div class="row-section row-neutral">
        <div class="preset-row">
          <input type="text" id="preset-name" placeholder="preset name">
          <button id="preset-save-btn" type="button">Save</button>
          <select id="preset-select"></select>
          <button id="preset-load-btn" type="button">Load</button>
          <button id="preset-delete-btn" type="button">Delete</button>
          <button id="preset-export-btn" type="button">Export</button>
          <button id="preset-import-btn" type="button">Import</button>
          <input type="file" id="preset-import-file" accept="application/json" style="display:none">
          <button id="midi-map-btn" type="button">MIDI MAP</button>
          <button id="midi-clear-btn" type="button" title="Clear all MIDI mappings">CLEAR</button>
          <span id="midi-activity" class="midi-activity">MIDI --</span>
        </div>
      </div>

      <div class="row-section row-neutral">
        <div class="pot-row">
          <div id="wave-mount"></div>
          <div id="yscale-mount"></div>
          <div id="a-mount"></div>
          <div class="module-divider"></div>
          <div id="freq-mount"></div>
          <div id="fmratio-mount"></div>
          <div id="fmindex-mount"></div>
        </div>
      </div>

      <div class="row-section row-orange">
        <div class="lfo-adsr-row">
          <div id="lfo-panel" class="lfo-panel"></div>
          <div class="module-divider"></div>
          <div id="env-panel" class="env-panel"></div>
        </div>
      </div>

      <div class="row-section row-pink">
        <div class="matrix-row">
          <div id="matrix-panel" class="matrix-grid"></div>
          <div class="module-divider"></div>
          <div class="volume-col">
            <span class="vol-label">VOL</span>
            <input type="range" min="0.0" max="1.0" value="0.4" class="vfader-console" id="volume">
          </div>
        </div>
      </div>

      <div class="row-section row-neutral row-scope">
        <canvas id="uiCanvas" class="scope-canvas"></canvas>
      </div>
    </div>

    <canvas id="canvas"></canvas>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
